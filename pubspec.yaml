name: avesquest
description: "AvesQuest — A mobile bird identification and collection journal."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.1.0
  intl: ^0.20.2
  path: ^1.9.1
  connectivity_plus: ^7.2.0
  share_plus: ^12.0.2
  http: ^1.3.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  sqflite: ^2.4.2
  exif_reader: ^4.1.0
  image: ^4.3.0
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/avesquest.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/splash_bg.jpg
    - assets/images/mascot.png
    - assets/images/logo.png
    - assets/pfp/
    - assets/icon/